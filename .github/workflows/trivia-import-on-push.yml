name: Trivia Import on Push

on:
  push:
    branches:
      - main
    paths:
      - "data/trivia/categories/**"
      - "data/live-trivia/categories/**"

concurrency:
  group: trivia-import-main
  cancel-in-progress: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Import Trivia to Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/import-trivia-questions.cjs --dir data/trivia/categories --live-dir data/live-trivia/categories

      - name: Trigger Vercel Redeploy
        if: secrets.VERCEL_DEPLOY_HOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "Deploy hook status: %{http_code}\n"
