name: Sync Live Trivia

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/live-trivia/categories/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate live trivia JSON
        run: npm run live-trivia:check

      - name: Import, prune, and verify live trivia questions
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run live-trivia:import
