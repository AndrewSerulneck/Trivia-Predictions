name: Trivia Nightly
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # 02:15 UTC nightly (~10:15 PM ET during DST / 9:15 PM ET during EST)
    - cron: "15 2 * * *"
  workflow_dispatch:

concurrency:
  group: trivia-nightly-main
  cancel-in-progress: false

jobs:
  generate-and-import:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate Trivia For All Categories
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACKS: ${{ secrets.GEMINI_MODEL_FALLBACKS || 'gemini-2.0-flash' }}
        run: node scripts/generate-trivia-nightly.cjs --total 200 --batch-size 25

      - name: Validate Trivia Files
        run: npm run trivia:check

      - name: Import Trivia To Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/import-trivia-questions.cjs --dir data/trivia/categories

      - name: Commit Updated Trivia Files
        run: |
          if git diff --quiet -- data/trivia/categories; then
            echo "No trivia JSON changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trivia/categories
          git commit -m "chore(trivia): nightly auto-generated questions"

          # Rebase onto latest main before push to avoid non-fast-forward failures.
          git pull --rebase origin main

          # Retry once in case main advances between pull and push.
          for attempt in 1 2; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              break
            fi

            if [ "$attempt" -eq 2 ]; then
              echo "Push failed after retries."
              exit 1
            fi

            echo "Push rejected, rebasing and retrying..."
            git pull --rebase origin main
          done
