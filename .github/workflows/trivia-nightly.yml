name: Trivia Nightly
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # 02:15 UTC nightly (~10:15 PM ET during DST / 9:15 PM ET during EST)
    - cron: "15 2 * * *"
  workflow_dispatch:

concurrency:
  group: trivia-nightly-main
  cancel-in-progress: false

jobs:
  generate-and-import:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate Speed Trivia (multiple-choice)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACKS: ${{ secrets.GEMINI_MODEL_FALLBACKS || 'gemini-2.0-flash' }}
        run: node scripts/generate-trivia-nightly.cjs --total 50 --batch-size 25

      - name: Generate Live Trivia (write-in)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACKS: ${{ secrets.GEMINI_MODEL_FALLBACKS || 'gemini-2.0-flash' }}
        run: node scripts/generate-live-trivia-nightly.cjs --total 50 --batch-size 25

      - name: Validate All Trivia Files
        run: npm run trivia:check

      - name: Import All Trivia To Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/import-trivia-questions.cjs --dir data/trivia/categories --live-dir data/live-trivia/categories

      - name: Commit Updated Trivia Files
        id: commit-trivia
        run: |
          speed_changed=$(git status --porcelain -- data/trivia/categories)
          live_changed=$(git status --porcelain -- data/live-trivia/categories)

          if [ -z "$speed_changed" ] && [ -z "$live_changed" ]; then
            echo "No trivia JSON changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          [ -n "$speed_changed" ] && git add data/trivia/categories
          [ -n "$live_changed" ] && git add data/live-trivia/categories

          git commit -m "chore(trivia): nightly auto-generated questions"

          # Rebase onto latest main before push to avoid non-fast-forward failures.
          git pull --rebase origin main

          # Retry once in case main advances between pull and push.
          for attempt in 1 2; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              break
            fi

            if [ "$attempt" -eq 2 ]; then
              echo "Push failed after retries."
              exit 1
            fi

            echo "Push rejected, rebasing and retrying..."
            git pull --rebase origin main
          done

      - name: Seed Today's Live Trivia Occurrences
        if: steps.commit-trivia.outputs.pushed == 'true'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          curl -s -X POST "${APP_URL}/api/cron/seed-live-trivia-occurrences" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -o /dev/null -w "Seed occurrences status: %{http_code}\n"

      - name: Trigger Vercel Redeploy
        if: steps.commit-trivia.outputs.pushed == 'true' && secrets.VERCEL_DEPLOY_HOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "Deploy hook status: %{http_code}\n"
