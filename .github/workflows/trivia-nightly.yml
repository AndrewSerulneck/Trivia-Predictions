name: Trivia Nightly
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # 02:15 UTC nightly (~10:15 PM ET during DST / 9:15 PM ET during EST)
    - cron: "15 2 * * *"
  workflow_dispatch:

concurrency:
  group: trivia-nightly-main
  cancel-in-progress: false

jobs:
  generate-and-import:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prepare Trivia Generation Workspace
        run: |
          mkdir -p "$RUNNER_TEMP/trivia-categories" "$RUNNER_TEMP/trivia-new"
          cp data/trivia/categories/*.json "$RUNNER_TEMP/trivia-categories"/

      - name: Generate Speed Trivia Review Candidates
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACKS: ${{ secrets.GEMINI_MODEL_FALLBACKS || 'gemini-2.0-flash' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/generate-trivia-nightly.cjs \
            --dir "$RUNNER_TEMP/trivia-categories" \
            --new-only-dir "$RUNNER_TEMP/trivia-new" \
            --total 100 \
            --batch-size 25 \
            --new-categories 0 \
            --allow-category-errors

      - name: Validate Generated Speed Trivia
        run: |
          if ! find "$RUNNER_TEMP/trivia-new" -name '*.json' -print -quit | grep -q .; then
            echo "No new Speed Trivia questions were generated. Skipping validation and import."
            exit 0
          fi

          node scripts/import-trivia-questions.cjs \
            --dir "$RUNNER_TEMP/trivia-new" \
            --status pending_review \
            --pool anytime_blitz \
            --answer-format multiple_choice \
            --check

      - name: Import Generated Speed Trivia To Supabase Review
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if ! find "$RUNNER_TEMP/trivia-new" -name '*.json' -print -quit | grep -q .; then
            echo "No new Speed Trivia questions were generated. Skipping Supabase import."
            exit 0
          fi

          node scripts/import-trivia-questions.cjs \
            --dir "$RUNNER_TEMP/trivia-new" \
            --status pending_review \
            --pool anytime_blitz \
            --answer-format multiple_choice
