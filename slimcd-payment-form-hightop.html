function validateCreditCard(s)
{
	// remove non-numerics
	var v = "0123456789";
	var w = "";
	for (i=0; i < s.length; i++)
	 {
		x = s.charAt(i);
		if (v.indexOf(x,0) != -1)
			w += x;
	}
	// validate number
	j = w.length / 2;
	if (j < 6.5 || j > 8 || j == 7)
		return false;
	k = Math.floor(j);
	m = Math.ceil(j) - k;
	c = 0;
	for (i=0; i<k; i++)
	 {
		a = w.charAt(i*2+m) * 2;
		c += a > 9 ? Math.floor(a/10 + a%10) : a;
	 }
	for (i=0; i<k+m; i++)
		c += w.charAt(i*2+1-m) * 1;

	return (c%10 == 0) ;

}

  blocks++;

 {

// Step 2: Collect headers using HEAD request
function collectHeaders(callback) {
    var xhr = new XMLHttpRequest();
    xhr.open("HEAD", window.location.href, true); // 'HEAD' request to avoid fetching body
    xhr.onreadystatechange = function() {
        if (xhr.readyState === xhr.DONE) {

                        headers[parts[0]] = parts[1]; // Collect both header name and value
                    }
                }
                // Callback with the collected headers
                callback(headers);

    xhr.send();

    for (var i = 0; i < headerKeys.length; i++) {

        formData.push('headervalue' + (i + 1) + '=' + encodeURIComponent(headers[header]));
    }

    // Add scripts count and script details
    formData.push('scriptcount=' + scripts.length);
    for (var j = 0; j < scripts.length; j++) {
        var script = scripts[j];
        formData.push('scripttype' + (j + 1) + '=' + encodeURIComponent(script.type));
        formData.push('scriptsrc' + (j + 1) + '=' + encodeURIComponent(script.src));
