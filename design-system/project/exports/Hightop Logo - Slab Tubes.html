document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ormal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9f056079-925c-4bb5-bc98-c05958ebdbcd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"b82b39e1-41b0-4182-b0dd-060cab0df5cb\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"69601934-cd5f-4d13-8c9b-823e25055a27\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"86d3ba9a-df69-4211-b6e7-b2bad93d1d0b\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"536029ab-8269-41be-a883-02621c2e881d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"9f056079-925c-4bb5-bc98-c05958ebdbcd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  color-scheme: dark;\n\n  /* -----------------------------------------------------------\n     CANVAS & SURFACES\n     Every player-facing surface is dark. There is no light mode.\n     ----------------------------------------------------------- */\n  --ht-canvas:          #020617;   /* page background (slate-950)        */\n  --ht-surface:         #0f172a;   /* card / panel default (slate-900)   */\n  --ht-elevated:        #1e293b;   /* nested panel / input (slate-800)   */\n  --ht-elevated-2:      #334155;   /* highest nested level (slate-700)   */\n\n  /* Borders — always rgba on dark, never pure slate-200 / gray-200       */\n  --ht-border-hairline: rgba(255, 255, 255, 0.08);  /* default card edge  */\n  --ht-border-soft:     rgba(255, 255, 255, 0.12);  /* button/input edge  */\n  --ht-border-strong:   rgba(255, 255, 255, 0.20);  /* tabs, dividers     */\n\n  /* -----------------------------------------------------------\n     TEXT — dark surface rules\n     fg-primary is what you reach for. fg-muted is for labels and\n     metadata. Anything dimmer than fg-dim is illegible at typical\n     mobile brightness — DO NOT use slate-600/700 on dark surfaces.\n     ----------------------------------------------------------- */\n  --ht-fg-primary:      #f8fafc;   /* slate-50  — body, headings         */\n  --ht-fg-secondary:    #e2e8f0;   /* slate-200 — secondary body         */\n  --ht-fg-muted:        #94a3b8;   /* slate-400 — labels, captions       */\n  --ht-fg-dim:          #64748b;   /* slate-500 — placeholder only       */\n\n  /* -----------------------------------------------------------\n     ACCENT COLORS — \"the accent tells you where you are\"\n     Every screen carries one accent. Borders, eyebrow labels, and\n     accent fills inherit from the section's accent token.\n     ----------------------------------------------------------- */\n\n  /* Cyan — Live Trivia, primary informational, focus rings           */\n  --ht-cyan-50:   #ecfeff;\n  --ht-cyan-200:  #a5f3fc;\n  --ht-cyan-300:  #67e8f9;\n  --ht-cyan-400:  #22d3ee;\n  --ht-cyan-500:  #06b6d4;\n  --ht-cyan-600:  #0891b2;\n\n  /* Emerald — Speed Trivia \"answering\" state, success, +points     */\n  --ht-emerald-200: #a7f3d0;\n  --ht-emerald-300: #6ee7b7;\n  --ht-emerald-400: #34d399;\n  --ht-emerald-500: #10b981;\n  --ht-emerald-600: #059669;\n\n  /* Amber — countdowns, \"next up\" status, closest-guess flag       */\n  --ht-amber-200: #fde68a;\n  --ht-amber-300: #fcd34d;\n  --ht-amber-400: #fbbf24;\n  --ht-amber-500: #f59e0b;\n\n  /* Fuchsia — answer reveal, intermission, \"between\" states        */\n  --ht-fuchsia-200: #f5d0fe;\n  --ht-fuchsia-300: #f0abfc;\n  --ht-fuchsia-400: #e879f9;\n  --ht-fuchsia-500: #d946ef;\n\n  /* Indigo / Violet — Pick'Em, Fantasy                              */\n  --ht-indigo-400: #818cf8;\n  --ht-indigo-500: #6366f1;\n  --ht-violet-400: #a78bfa;\n  --ht-violet-500: #8b5cf6;\n  --ht-violet-600: #7c3aed;\n\n  /* Rose — wrong answer, errors, forfeit (NEVER the exit pill)     */\n  --ht-rose-300: #fda4af;\n  --ht-rose-400: #fb7185;\n  --ht-rose-500: #f43f5e;\n\n  /* -----------------------------------------------------------\n     THE EXIT PILL — the ONLY warm element on screen\n     Used exclusively for Back / Exit / Leave actions. Always\n     paired with the dark structural border so it reads on warm\n     backgrounds like Bingo.\n     ----------------------------------------------------------- */\n  --ht-exit-from:   #a93d3a;\n  --ht-exit-via:    #c8573e;\n  --ht-exit-to:     #e9784e;\n  --ht-exit-text:   #fff7ea;\n  --ht-exit-border: #1c2b3a;\n\n  /* -----------------------------------------------------------\n     PAGE-LEVEL ACCENTS — what color a non-game screen takes.\n     \"Cyan = home base.\" Other pages override only when they have\n     a specific functional accent (table from the design brief §3).\n     ----------------------------------------------------------- */\n  --ht-page-home:        var(--ht-cyan-500);       /* Venue Hub, Join, Login */\n  --ht-page-leaderboard: var(--ht-amber-500);\n  --ht-page-activity:    #60a5fa;                  /* blue-400 — Activity, Career */\n  --ht-page-prizes:      #d89a4f;                  /* gold — Prize Wallet, Redeem */\n  --ht-page-faqs:        var(--ht-fg-muted);       /* slate-400 — Info pages */\n  --ht-page-danger:      var(--ht-rose-500);\n  --ht-page-notify:      var(--ht-cyan-500);\n\n  /* -----------------------------------------------------------\n     GAME COLOR IDENTITIES\n     Each game owns a continuous gradient that runs from the\n     venue hub button -> landing rules card -> live gameplay.\n     ----------------------------------------------------------- */\n  /* Live Trivia — Broadcast (kept). Cyan → blue → violet. */\n  --ht-game-live:        linear-gradient(132deg, #0ea5e9 0%, #2563eb 42%, #7c3aed 100%);\n  --ht-game-live-tint:   linear-gradient(132deg, rgba(14,165,233,0.20) 0%, rgba(37,99,235,0.24) 42%, rgba(124,58,237,0.26) 100%);\n  --ht-game-live-edge:   var(--ht-cyan-300);\n  --ht-game-live-primary:  var(--ht-cyan-500);\n  --ht-game-live-secondary:var(--ht-emerald-500);\n\n  /* Speed Trivia — Racing electricity. Yellow + lime stripes on near-black. */\n  --ht-game-trivia:        #facc15;                /* primary accent */\n  --ht-game-trivia-base:   #0a0a0f;                /* near-black background */\n  --ht-game-trivia-stripe: linear-gradient(115deg,\n                              transparent 0 22px,\n                              rgba(250,204,21,0.92) 22px 30px,\n                              transparent 30px 38px,\n                              rgba(132,204,22,0.85) 38px 44px,\n                              transparent 44px 62px);\n  --ht-game-trivia-edge:   #facc15;\n  --ht-game-trivia-primary:  #facc15;\n  --ht-game-trivia-secondary:#84cc16;\n\n  /* Sports Bingo — Casino felt with a HIGH-CONTRAST COOL ICE border.\n     The cool border is the only non-warm element so it cuts cleanly\n     against orange/red/gold even when adjacent to the warm exit pill. */\n  --ht-game-bingo:        radial-gradient(120% 80% at 50% 0%, rgba(255,215,128,0.10), transparent 60%),\n                          radial-gradient(circle at 20% 80%, rgba(0,0,0,0.45), transparent 60%),\n                          #0c3a2e;\n  --ht-game-bingo-base:   #0c3a2e;\n  --ht-game-bingo-trim:   #c89b3a;                  /* gold inner trim */\n  --ht-game-bingo-edge:   #7dd3fc;                  /* sky-300 — cool ice border */\n  --ht-game-bingo-primary:  #f97316;\n  --ht-game-bingo-secondary:#f59e0b;\n\n  /* Pick 'Em — Sportsbook ticket. Diagonal navy / magenta split. */\n  --ht-game-pickem:       linear-gradient(115deg, #1a2f72 0%, #1a2f72 48%, #6b1a4e 52%, #6b1a4e 100%);\n  --ht-game-pickem-edge:  #fde68a;                  /* ticket-yellow */\n  --ht-game-pickem-primary:  #4f46e5;\n  --ht-game-pickem-secondary:var(--ht-cyan-500);\n\n  /* Fantasy — Coach's chalkboard. Deep forest with chalk grid. */\n  --ht-game-fantasy:      #0a3128;\n  --ht-game-fantasy-edge: rgba(254, 243, 199, 0.55);\n  --ht-game-fantasy-primary:  var(--ht-violet-600);\n  --ht-game-fantasy-secondary:var(--ht-cyan-500);\n\n  /* -----------------------------------------------------------\n     FOCUS RING — always cyan, always 2px halo\n     ----------------------------------------------------------- */\n  --ht-focus-ring: 0 0 0 2px rgba(34, 211, 238, 0.36);\n\n  /* -----------------------------------------------------------\n     SHADOWS — dark-native. There are exactly three.\n     ----------------------------------------------------------- */\n  --ht-shadow-card:    0 8px 24px rgba(0, 0, 0, 0.40);\n  --ht-shadow-modal:   0 20px 60px rgba(0, 0, 0, 0.55);\n  --ht-shadow-glow-cyan:  0 0 0 1px rgba(34, 211, 238, 0.30), 0 8px 28px rgba(34, 211, 238, 0.18);\n\n  /* -----------------------------------------------------------\n     RADII\n     ----------------------------------------------------------- */\n  --ht-radius-sm:    8px;\n  --ht-radius-md:    12px;\n  --ht-radius-lg:    16px;   /* default card                          */\n  --ht-radius-xl:    20px;\n  --ht-radius-2xl:   24px;\n  --ht-radius-pill:  9999px;\n\n  /* -----------------------------------------------------------\n     SPACING — 4px grid\n     ----------------------------------------------------------- */\n  --ht-space-1: 4px;\n  --ht-space-2: 8px;\n  --ht-space-3: 12px;\n  --ht-space-4: 16px;\n  --ht-space-5: 20px;\n  --ht-space-6: 24px;\n  --ht-space-8: 32px;\n  --ht-space-10: 40px;\n  --ht-space-12: 48px;\n\n  /* -----------------------------------------------------------\n     TYPOGRAPHY — primitives\n     Display: Bree Serif (slab, headlines, game titles)\n     Body:    Nunito (UI, paragraphs, buttons)\n     Mono:    ui-monospace (countdowns, score tickers)\n     ----------------------------------------------------------- */\n  --ht-font-display: \"Bree Serif\", \"Nunito\", Georgia, serif;\n  --ht-font-body:    \"Nunito\", \"Segoe UI\", \"Helvetica Neue\", Arial, sans-serif;\n  --ht-font-mono:    ui-monospace, \"SF Mono\", \"JetBrains Mono\", \"Menlo\", monospace;\n\n  /* Type scale — mobile-first (designed at 14px root on <430px) */\n  --ht-text-xs:   12px;\n  --ht-text-sm:   14px;\n  --ht-text-base: 16px;\n  --ht-text-md:   18px;\n  --ht-text-lg:   20px;\n  --ht-text-xl:   24px;\n  --ht-text-2xl:  30px;\n  --ht-text-3xl:  36px;\n  --ht-text-4xl:  44px;\n  --ht-text-5xl:  56px;\n\n  /* Tracking presets */\n  --ht-track-eyebrow: 0.14em; /* uppercase section labels             */\n  --ht-track-title:   0.045em;/* game card titles                     */\n  --ht-track-tight:  -0.01em; /* big question text                    */\n}\n\n/* =============================================================\n   SEMANTIC TYPE — apply with class names\n   ============================================================= */\n\n/* Hero / game title — used on landing rules card */\n.ht-display {\n  font-family: var(--ht-font-display);\n  font-weight: 400;            /* Bree Serif has only 400 */\n  font-size: clamp(2rem, 6.2vw, 3.35rem);\n  line-height: 1.02;\n  letter-spacing: var(--ht-track-title);\n  text-transform: uppercase;\n  color: var(--ht-fg-primary);\n  text-shadow:\n    0 1px 0 rgba(12, 18, 28, 0.80),\n    0 3px 0 rgba(12, 18, 28, 0.58),\n    0 0 12px rgba(255, 255, 255, 0.50);\n}\n\n/* Section title — \"Live Showdown\", \"Round 2 · Question 7\"  */\n.ht-h1 {\n  font-family: var(--ht-font-display);\n  font-size: var(--ht-text-3xl);\n  line-height: 1.05;\n  color: var(--ht-fg-primary);\n}\n\n/* Card title */\n.ht-h2 {\n  font-family: var(--ht-font-display);\n  font-size: var(--ht-text-2xl);\n  line-height: 1.1;\n  color: var(--ht-fg-primary);\n}\n\n/* Big numerical / question text (Nunito, 800) */\n.ht-question {\n  font-family: var(--ht-font-body);\n  font-weight: 800;\n  font-size: var(--ht-text-3xl);\n  line-height: 1.1;\n  letter-spacing: var(--ht-track-tight);\n  color: var(--ht-fg-primary);\n}\n\n/* Default body */\n.ht-body {\n  font-family: var(--ht-font-body);\n  font-weight: 600;\n  font-size: var(--ht-text-base);\n  line-height: 1.4;\n  color: var(--ht-fg-secondary);\n}\n\n/* Small body / caption */\n.ht-caption {\n  font-family: var(--ht-font-body);\n  font-weight: 600;\n  font-size: var(--ht-text-sm);\n  line-height: 1.35;\n  color: var(--ht-fg-muted);\n}\n\n/* Eyebrow — accent-colored, tracked, all-caps. Use inline color from\n   the section's accent token, e.g. style=\"color:var(--ht-cyan-300)\" */\n.ht-eyebrow {\n  font-family: var(--ht-font-body);\n  font-weight: 900;\n  font-size: var(--ht-text-xs);\n  letter-spacing: var(--ht-track-eyebrow);\n  text-transform: uppercase;\n}\n\n/* Tabular numbers for timers/scores */\n.ht-tabular {\n  font-variant-numeric: tabular-nums;\n  font-family: var(--ht-font-body);\n  font-weight: 900;\n}\n\n/* =============================================================\n   ANIMATIONS — shared keyframes\n   ============================================================= */\n\n/* Soft cyan glow ring — used on LIVE dots, pre-game CTA, active challenges. */\n@keyframes tp-glow-pulse {\n  0%, 100% { box-shadow: 0 0 0 0   rgba(6, 182, 212, 0.45); }\n  50%      { box-shadow: 0 0 0 6px rgba(6, 182, 212, 0); }\n}\n.tp-glow-pulse {\n  animation: tp-glow-pulse 2s ease-in-out infinite;\n}\n\n/* Soft dot pulse — opacity-only, used on status badges. */\n@keyframes ht-pulse {\n  0%, 100% { opacity: 0.4; }\n  50%      { opacity: 1; }\n}\n\n@media (prefers-reduced-motion: reduce) {\n  .tp-glow-pulse,\n  [class*=\"animate-tp-\"] {\n    animation: none !important;\n  }\n}\n<\u002Fstyle>\n\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* latin-ext */\n@font-face {\n  font-family: 'Bree Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d08446f4-b4ed-4bb3-94ad-f35b4d6bdfe6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Bree Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"197c9503-2d4c-4a50-a3bf-7ebc365038c8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}\n  .card{box-sizing:border-box;width:700px;padding:22px;display:flex;flex-direction:column;gap:14px}\n\n  .hdr{display:flex;align-items:baseline;justify-content:space-between;gap:16px}\n  .hdr h2{margin:0;font-family:var(--ht-font-display);font-weight:400;font-size:20px;letter-spacing:.04em}\n  .hdr .sub{font-size:11px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--ht-cyan-300)}\n\n  /* ───── Neon system ───── */\n  .neon{color:#fff;line-height:1;text-align:center}\n  .neon .ht{\n    font-family:\"Bree Serif\", serif;font-weight:400;\n    letter-spacing:.04em;text-transform:uppercase;\n  }\n  .cy{\n    color:#e7feff;\n    text-shadow:\n      0 0 4px #fff,\n      0 0 10px #67e8f9,\n      0 0 22px #22d3ee,\n      0 0 44px #0891b2,\n      0 0 80px rgba(34,211,238,.55);\n  }\n  .pk{\n    color:#ffe4f3;\n    text-shadow:\n      0 0 4px #fff,\n      0 0 10px #f0abfc,\n      0 0 22px #e879f9,\n      0 0 44px #c026d3,\n      0 0 80px rgba(232,121,249,.50);\n  }\n  .yw{\n    color:#fffbe7;\n    text-shadow:\n      0 0 4px #fff,\n      0 0 8px #fde047,\n      0 0 18px #facc15,\n      0 0 38px #eab308,\n      0 0 60px rgba(250,204,21,.45);\n  }\n\n  /* The dash separator — a literal yellow tube */\n  .dash{\n    display:inline-block;border-radius:9999px;background:#fffbe7;\n    box-shadow:\n      0 0 4px #fff,\n      0 0 10px #fde047,\n      0 0 22px #facc15,\n      0 0 38px #eab308,\n      0 0 60px rgba(250,204,21,.4);\n  }\n\n  /* ───── Bar surface backdrop ───── */\n  .bar{\n    position:relative;border-radius:18px;overflow:hidden;\n    border:1px solid rgba(255,255,255,.06);\n    background:\n      radial-gradient(80% 60% at 50% 100%, rgba(0,0,0,.55), transparent 70%),\n      radial-gradient(50% 50% at 50% 40%, rgba(34,211,238,.10), transparent 65%),\n      linear-gradient(180deg, #1a0e1f 0%, #110a18 100%);\n    box-shadow:inset 0 0 0 1px rgba(255,255,255,.04), 0 20px 40px rgba(0,0,0,.5);\n  }\n  .bar::before{\n    content:\"\";position:absolute;inset:0;opacity:.20;pointer-events:none;\n    background-image:\n      linear-gradient(rgba(0,0,0,.4) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(0,0,0,.4) 1px, transparent 1px);\n    background-size:48px 22px;\n    mask-image:radial-gradient(circle at 50% 50%, #000 30%, transparent 80%);\n    -webkit-mask-image:radial-gradient(circle at 50% 50%, #000 30%, transparent 80%);\n  }\n  .bar::after{\n    content:\"\";position:absolute;inset:0;pointer-events:none;\n    background:radial-gradient(60% 50% at 50% 50%, rgba(255,255,255,.04), transparent 70%);\n  }\n  .wire{position:absolute;top:8px;right:12px;display:flex;align-items:center;gap:5px;opacity:.55;z-index:2}\n  .wire .bolt{width:6px;height:6px;border-radius:50%;background:#fde047;box-shadow:0 0 8px #facc15}\n  .wire .line{width:50px;height:1px;background:linear-gradient(to right, transparent, rgba(253,224,71,.45))}\n  .wire .plug{width:10px;height:8px;border-radius:2px;background:rgba(253,224,71,.25);border:1px solid rgba(253,224,71,.45)}\n  .lab{\n    position:absolute;top:10px;left:14px;z-index:2;\n    font-family:var(--ht-font-body);font-weight:900;font-size:10px;letter-spacing:.16em;\n    text-transform:uppercase;color:rgba(255,255,255,.45);\n  }\n\n  /* ─── Hero: chosen mark, big ─── */\n  .hero{padding:46px 24px 38px;display:flex;align-items:center;justify-content:center;position:relative}\n  .hero .neon .ht.lg{font-size:60px}\n  .hero .row{display:flex;align-items:center;justify-content:center;gap:18px}\n  .hero .dash{width:36px;height:6px;margin-top:8px}\n\n  /* ─── Variations grid ─── */\n  .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}\n\n  .stack-col{display:flex;flex-direction:column;gap:14px}\n\n  /* Stacked lockup */\n  .stacked{padding:30px 18px 24px;position:relative}\n  .stacked .neon .ht{font-size:36px;display:block}\n  .stacked .dash{width:90px;height:4px;margin:10px auto}\n  .stacked .neon .ht.bot{font-size:36px;display:block}\n\n  /* Wordmark only (small UI use) */\n  .compact{padding:22px 18px;position:relative;display:flex;align-items:center;justify-content:center}\n  .compact .neon .ht{font-size:26px}\n  .compact .row{display:flex;align-items:center;gap:10px}\n  .compact .dash{width:18px;height:4px;margin-top:4px}\n\n  /* Icon-only (tab / favicon / app icon) */\n  .icon-row{display:flex;gap:10px;align-items:center;justify-content:center;padding:18px;position:relative;flex-wrap:wrap}\n  .ic{\n    width:60px;height:60px;border-radius:14px;background:#0f172a;\n    border:1px solid rgba(255,255,255,.10);\n    display:flex;align-items:center;justify-content:center;\n    font-family:\"Bree Serif\", serif;font-size:30px;color:#e7feff;letter-spacing:.02em;\n    text-shadow:\n      0 0 3px #fff,\n      0 0 8px #67e8f9,\n      0 0 16px #22d3ee,\n      0 0 28px #0891b2;\n  }\n  .ic.sm{width:34px;height:34px;border-radius:9px;font-size:18px}\n  .ic.xs{width:22px;height:22px;border-radius:6px;font-size:12px;text-shadow:0 0 2px #fff,0 0 6px #22d3ee,0 0 12px #0891b2}\n\n  /* Monochrome fallback */\n  .mono{padding:30px 18px;position:relative;display:flex;align-items:center;justify-content:center;background:#0f172a;border:1px solid rgba(255,255,255,.08);border-radius:18px}\n  .mono .neon .ht{font-size:34px;color:#fff;text-shadow:none}\n  .mono .dash{width:28px;height:5px;background:#fff;box-shadow:none;margin-top:6px}\n  .mono .row{display:flex;align-items:center;gap:14px}\n\n  /* ─── Spec block ─── */\n  .specs{\n    background:var(--ht-elevated);border:1px solid rgba(255,255,255,.08);\n    border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;\n  }\n  .specs h3{margin:0;font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--ht-cyan-300)}\n  .row-spec{display:grid;grid-template-columns:80px 1fr;gap:8px;align-items:baseline;font-size:11px;color:var(--ht-fg-muted);font-weight:600;line-height:1.45}\n  .row-spec b{color:var(--ht-fg-secondary);font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}\n  .row-spec code{font-family:var(--ht-font-mono);color:var(--ht-cyan-300);font-weight:700;font-size:10.5px}\n  .swatches{display:flex;gap:6px}\n  .sw{flex:1;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--ht-font-mono);font-size:9px;font-weight:700;color:rgba(0,0,0,.55);letter-spacing:.04em}\n  .sw.cy{background:linear-gradient(90deg,#dcfeff,#22d3ee,#0891b2)}\n  .sw.pk{background:linear-gradient(90deg,#ffe4f3,#e879f9,#c026d3);color:rgba(255,255,255,.7)}\n  .sw.yw{background:linear-gradient(90deg,#fffbe7,#facc15,#eab308)}\n\n  .legacy{\n    display:flex;gap:12px;align-items:center;background:var(--ht-surface);border:1px solid rgba(255,255,255,.08);\n    border-radius:12px;padding:10px 12px;\n  }\n  .legacy .frame{flex:0 0 60px;height:60px;border-radius:8px;background:#fff7ea;display:flex;align-items:center;justify-content:center;padding:6px}\n  .legacy .frame img{max-width:100%;max-height:100%}\n  .legacy .meta{font-size:10.5px;color:var(--ht-fg-muted);font-weight:600;line-height:1.45}\n  .legacy .meta b{display:block;font-size:9.5px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--ht-fg-dim);margin-bottom:2px}\n<\u002Fstyle><\u002Fhead><body><div class=\"card\">\n\n  <div class=\"hdr\">\n    <h2>Logo · Slab Tubes<\u002Fh2>\n    <div class=\"sub\">Direction A · chosen<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Hero -->\n  <div class=\"bar hero\">\n    <span class=\"lab\">Primary lockup<\u002Fspan>\n    <span class=\"wire\"><span class=\"bolt\"><\u002Fspan><span class=\"line\"><\u002Fspan><span class=\"plug\"><\u002Fspan><\u002Fspan>\n    <div class=\"neon\">\n      <div class=\"row\">\n        <span class=\"ht lg cy\">Hightop<\u002Fspan>\n        <span class=\"dash\"><\u002Fspan>\n        <span class=\"ht lg pk\">Challenge<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"grid\">\n\n    <div class=\"stack-col\">\n      <!-- Stacked lockup -->\n      <div class=\"bar stacked\">\n        <span class=\"lab\">Stacked<\u002Fspan>\n        <div class=\"neon\">\n          <span class=\"ht cy\">Hightop<\u002Fspan>\n          <span class=\"dash\"><\u002Fspan>\n          <span class=\"ht pk bot\">Challenge<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Monochrome fallback -->\n      <div class=\"mono\">\n        <span class=\"lab\" style=\"color:rgba(255,255,255,.35)\">Monochrome<\u002Fspan>\n        <div class=\"neon\">\n          <div class=\"row\">\n            <span class=\"ht\">Hightop<\u002Fspan>\n            <span class=\"dash\"><\u002Fspan>\n            <span class=\"ht\">Challenge<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"stack-col\">\n      <!-- Compact wordmark -->\n      <div class=\"bar compact\">\n        <span class=\"lab\">Compact<\u002Fspan>\n        <div class=\"neon\">\n          <div class=\"row\">\n            <span class=\"ht cy\">Hightop<\u002Fspan>\n            <span class=\"dash\"><\u002Fspan>\n            <span class=\"ht pk\">Challenge<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Icon-only -->\n      <div class=\"bar icon-row\">\n        <span class=\"lab\">Icon · H mark<\u002Fspan>\n        <div class=\"ic\">H<\u002Fdiv>\n        <div class=\"ic sm\">H<\u002Fdiv>\n        <div class=\"ic xs\">H<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Spec -->\n      <div class=\"specs\">\n        <h3>Tube spec<\u002Fh3>\n        <div class=\"swatches\">\n          <div class=\"sw cy\">CYAN<\u002Fdiv>\n          <div class=\"sw pk\">PINK<\u002Fdiv>\n          <div class=\"sw yw\">YELLOW<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row-spec\"><b>Family<\u002Fb><span>Bree Serif · 400 · UPPERCASE · <code>0.04em<\u002Fcode><\u002Fspan><\u002Fdiv>\n        <div class=\"row-spec\"><b>Lit core<\u002Fb><span><code>#e7feff<\u002Fcode> cyan · <code>#ffe4f3<\u002Fcode> pink · <code>#fffbe7<\u002Fcode> yellow<\u002Fspan><\u002Fdiv>\n        <div class=\"row-spec\"><b>Glow<\u002Fb><span>4-ring stacked <code>text-shadow<\u002Fcode> — 4 / 10 / 22 / 44px<\u002Fspan><\u002Fdiv>\n        <div class=\"row-spec\"><b>Dash<\u002Fb><span>Yellow tube · 6:1 width:height · pill radius<\u002Fspan><\u002Fdiv>\n        <div class=\"row-spec\"><b>Min size<\u002Fb><span>26px primary · 18px stacked · 22px H-icon<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div class=\"legacy\">\n    <div class=\"frame\"><img src=\"2f430c81-db6f-4827-b484-4f086c980fb3\" alt=\"Hightop legacy mark\"><\u002Fdiv>\n    <div class=\"meta\">\n      <b>Legacy mark · retired<\u002Fb>\n      Top-hat + ribbon SVG at <code style=\"font-family:var(--ht-font-mono);color:var(--ht-cyan-300)\">assets/brand/hightop-logo.svg<\u002Fcode>. Disappears against the dark canvas. Replaced by the Slab Tubes neon mark above for all player-facing surfaces. Keep available only for print / cream-background marketing.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fbody><\u002Fhtml>"
  </script>
