<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px;display:flex;flex-direction:column;gap:10px}
  .lab{font-weight:900;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ht-cyan-300)}
  .frame{
    border-radius:16px;background:var(--ht-surface);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 8px 24px rgba(0,0,0,.40);
    overflow:hidden;
  }
  table{width:100%;border-collapse:collapse}
  thead th{
    text-align:left;padding:12px 14px;font-weight:900;font-size:11px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--ht-cyan-300);
    background:rgba(34,211,238,.08);
    border-bottom:1px solid rgba(34,211,238,.20);
  }
  thead th:last-child{text-align:right}
  td{padding:10px 14px;font-weight:700;font-size:14px;border-bottom:1px solid rgba(255,255,255,.06)}
  tr:last-child td{border-bottom:0}
  .rank{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:34px;height:24px;border-radius:9999px;padding:0 8px;
    font-size:11px;font-weight:900;letter-spacing:.06em;border:1px solid;
  }
  .r1{color:#fde68a;background:rgba(252,211,77,.18);border-color:rgba(252,211,77,.6)}
  .r2{color:#e2e8f0;background:rgba(226,232,240,.12);border-color:rgba(226,232,240,.5)}
  .r3{color:#fdba74;background:rgba(253,186,116,.15);border-color:rgba(253,186,116,.55)}
  .rd{color:var(--ht-fg-secondary);background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.22)}
  .you{color:var(--ht-cyan-300);background:rgba(34,211,238,.12);border-color:rgba(34,211,238,.45);font-weight:900;padding:1px 8px;font-size:10px;border-radius:9999px;border:1px solid;letter-spacing:.08em;margin-left:8px;text-transform:uppercase}
  .me{background:rgba(34,211,238,.06)}
  .pts{text-align:right;font-variant-numeric:tabular-nums;color:var(--ht-fg-primary);font-weight:900}
</style></head><body><div class="card">
  <div class="frame">
    <table>
      <thead><tr><th style="width:90px">Rank</th><th>Username</th><th>Points</th></tr></thead>
      <tbody>
        <tr><td><span class="rank r1">1st</span></td><td>karaoke_kraken</td><td class="pts">428</td></tr>
        <tr><td><span class="rank r2">2nd</span></td><td>nine_ball_neil</td><td class="pts">391</td></tr>
        <tr><td><span class="rank r3">3rd</span></td><td>last_call_lucy</td><td class="pts">347</td></tr>
        <tr class="me"><td><span class="rank rd">#4</span></td><td>you_are_here<span class="you">you</span></td><td class="pts">312</td></tr>
        <tr><td><span class="rank rd">#5</span></td><td>frosty_mug_42</td><td class="pts">298</td></tr>
      </tbody>
    </table>
  </div>
  <div class="lab" style="color:var(--ht-fg-muted)">Leaderboard table — dark rebuild (replaces the legacy <code style="font-family:var(--ht-font-mono);color:var(--ht-cyan-300);font-weight:700">#4a2e18</code> wood frame)</div>
</div></body></html>
