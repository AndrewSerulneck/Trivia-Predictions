<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .r{height:96px;background:var(--ht-surface);border:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:var(--ht-fg-primary)}
  .r b{font-weight:900;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ht-cyan-300);display:block;margin-bottom:2px}
  .r span{font-family:var(--ht-font-mono);font-size:11px;color:var(--ht-fg-muted);font-weight:700;font-variant-numeric:tabular-nums}
</style></head><body><div class="card">
  <div class="r" style="border-radius:8px"><b>sm</b><span>8px</span></div>
  <div class="r" style="border-radius:12px"><b>md</b><span>12px · inputs</span></div>
  <div class="r" style="border-radius:16px"><b>lg</b><span>16px · default card</span></div>
  <div class="r" style="border-radius:20px"><b>xl</b><span>20px</span></div>
  <div class="r" style="border-radius:24px"><b>2xl</b><span>24px · rules card</span></div>
  <div class="r" style="border-radius:9999px;height:48px;align-self:center"><b style="margin-bottom:0">pill</b><span>9999px · button</span></div>
</div></body></html>
