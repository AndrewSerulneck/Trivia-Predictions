<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px 28px;display:flex;flex-direction:column;gap:6px}
  .row{display:grid;grid-template-columns:46px 1fr 80px;gap:14px;align-items:baseline;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06)}
  .row:last-child{border-bottom:0}
  .tag{font-weight:900;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ht-cyan-300)}
  .spec{color:var(--ht-fg-muted);font-weight:700;font-size:11px;font-variant-numeric:tabular-nums;text-align:right}
  .s{font-family:var(--ht-font-body);font-weight:800;color:var(--ht-fg-primary);line-height:1.1}
</style></head><body><div class="card">
  <div class="row"><span class="tag">xs</span><span class="s" style="font-size:12px">The quick brown fox</span><span class="spec">12 / 16</span></div>
  <div class="row"><span class="tag">sm</span><span class="s" style="font-size:14px">The quick brown fox</span><span class="spec">14 / 19</span></div>
  <div class="row"><span class="tag">base</span><span class="s" style="font-size:16px">The quick brown fox</span><span class="spec">16 / 22</span></div>
  <div class="row"><span class="tag">md</span><span class="s" style="font-size:18px">The quick brown fox</span><span class="spec">18 / 25</span></div>
  <div class="row"><span class="tag">lg</span><span class="s" style="font-size:20px">The quick brown fox</span><span class="spec">20 / 28</span></div>
  <div class="row"><span class="tag">xl</span><span class="s" style="font-size:24px">The quick brown fox</span><span class="spec">24 / 31</span></div>
  <div class="row"><span class="tag">2xl</span><span class="s" style="font-size:30px">The quick brown fox</span><span class="spec">30 / 36</span></div>
  <div class="row"><span class="tag">3xl</span><span class="s" style="font-size:36px">The quick brown fox</span><span class="spec">36 / 41</span></div>
</div></body></html>
