<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px 28px;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .pill{
    background:linear-gradient(to right,#a93d3a,#c8573e,#e9784e);
    border:1px solid #1c2b3a;color:#fff7ea;
    border-radius:9999px;min-height:44px;
    display:inline-flex;align-items:center;gap:10px;
    padding:0 18px;font-weight:700;font-size:14px;
    box-shadow:0 1px 3px rgba(28,43,58,.35);
  }
  .pill .arrow{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:rgba(255,247,234,.20);font-size:12px}
  .gradient{height:44px;border-radius:14px;background:linear-gradient(to right,#a93d3a,#c8573e,#e9784e);box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
  .row-stops{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .stop{background:var(--ht-surface);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 12px}
  .stop b{display:block;font-size:11px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--ht-fg-muted);margin-bottom:2px}
  .stop code{font-family:var(--ht-font-mono);color:var(--ht-fg-primary);font-size:12px;font-weight:700}
  .swatch{display:inline-block;width:14px;height:14px;border-radius:50%;margin-right:8px;vertical-align:-2px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.2)}
  .note{font-size:11px;color:var(--ht-fg-muted);font-weight:600;line-height:1.4}
</style></head><body><div class="card">
  <div class="row">
    <button class="pill"><span class="arrow">←</span>Back to Venue</button>
    <button class="pill" style="padding:0 16px">Close</button>
    <button class="pill" style="padding:0 20px">Leave Game</button>
  </div>
  <div class="gradient"></div>
  <div class="row-stops">
    <div class="stop"><b><span class="swatch" style="background:#a93d3a"></span>from</b><code>#a93d3a</code></div>
    <div class="stop"><b><span class="swatch" style="background:#c8573e"></span>via</b><code>#c8573e</code></div>
    <div class="stop"><b><span class="swatch" style="background:#e9784e"></span>to</b><code>#e9784e</code></div>
  </div>
  <div class="note">The only warm element on screen. 1px dark structural border <code>#1c2b3a</code> reads on warm Bingo backgrounds. Press: <code>scale(0.95) brightness(0.9)</code>. Never use rose-500 here.</div>
</div></body></html>
