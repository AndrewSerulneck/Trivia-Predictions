<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .tile{background:var(--ht-surface);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .frame{width:100%;aspect-ratio:1;border-radius:10px;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;padding:6px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}
  .frame img{max-width:100%;max-height:100%;object-fit:contain}
  .label{font-weight:900;font-size:10px;letter-spacing:.08em;text-transform:uppercase;text-align:center;color:var(--ht-fg-secondary);line-height:1.2}
  .label small{display:block;font-weight:700;font-size:9px;letter-spacing:.04em;color:var(--ht-fg-muted);margin-top:2px;text-transform:none}
</style></head><body><div class="card">
  <div class="tile"><div class="frame"><img src="../assets/brand/trivia_icon.png" alt="Trivia"/></div><div class="label">Trivia<small>trivia_icon.png</small></div></div>
  <div class="tile"><div class="frame"><img src="../assets/brand/live_trivia_icon.png" alt="Live Trivia"/></div><div class="label">Live<small>live_trivia_icon.png</small></div></div>
  <div class="tile"><div class="frame"><img src="../assets/brand/bingo_icon.png" alt="Bingo"/></div><div class="label">Bingo<small>bingo_icon.png</small></div></div>
  <div class="tile"><div class="frame"><img src="../assets/brand/pickem_icon.png" alt="Pick'Em"/></div><div class="label">Pick 'Em<small>pickem_icon.png</small></div></div>
  <div class="tile"><div class="frame"><img src="../assets/brand/fantasy_icon.png" alt="Fantasy"/></div><div class="label">Fantasy<small>fantasy_icon.png</small></div></div>
</div></body></html>
