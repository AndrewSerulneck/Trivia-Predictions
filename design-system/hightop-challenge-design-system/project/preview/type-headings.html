<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px 28px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:baseline;gap:18px}
  .tag{flex:0 0 64px;font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--ht-cyan-300)}
  .h1{font-family:var(--ht-font-display);font-size:36px;line-height:1.05;color:var(--ht-fg-primary)}
  .h2{font-family:var(--ht-font-display);font-size:28px;line-height:1.1;color:var(--ht-fg-primary)}
  .q{font-family:var(--ht-font-body);font-weight:800;font-size:30px;line-height:1.1;letter-spacing:-.01em;color:var(--ht-fg-primary)}
  .desc{font-size:11px;color:var(--ht-fg-muted);font-weight:600;margin-top:2px}
</style></head><body><div class="card">
  <div class="row"><div class="tag">.ht-h1</div><div><div class="h1">Live Showdown</div><div class="desc">Bree Serif · 36 / 38 — section title</div></div></div>
  <div class="row"><div class="tag">.ht-h2</div><div><div class="h2">Round 2 · Question 7</div><div class="desc">Bree Serif · 28 / 31 — card title</div></div></div>
  <div class="row"><div class="tag">.ht-q</div><div><div class="q">Which planet is known as the Red Planet?</div><div class="desc">Nunito 800 · 30 / 33 · -0.01em — question text</div></div></div>
</div></body></html>
