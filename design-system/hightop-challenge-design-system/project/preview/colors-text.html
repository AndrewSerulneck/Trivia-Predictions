<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{border-radius:14px;background:var(--ht-surface);border:1px solid rgba(255,255,255,.08);padding:14px;display:flex;flex-direction:column;gap:8px;height:120px;justify-content:space-between}
  .sample{font-weight:800;font-size:18px;line-height:1.2}
  .lab{font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--ht-cyan-300)}
  .hex{font-weight:700;font-size:11px;color:var(--ht-fg-muted);font-variant-numeric:tabular-nums}
</style></head><body><div class="card">
  <div class="sw"><div><div class="lab">primary</div><div class="sample" style="color:#f8fafc">Aa — Answer locked</div></div><div class="hex">#f8fafc · slate-50</div></div>
  <div class="sw"><div><div class="lab">secondary</div><div class="sample" style="color:#e2e8f0">Aa — Showing top players</div></div><div class="hex">#e2e8f0 · slate-200</div></div>
  <div class="sw"><div><div class="lab">muted</div><div class="sample" style="color:#94a3b8">Aa — Venue ranking</div></div><div class="hex">#94a3b8 · slate-400</div></div>
  <div class="sw"><div><div class="lab">dim</div><div class="sample" style="color:#64748b">Aa — Type answer…</div></div><div class="hex">#64748b · slate-500</div></div>
</div></body></html>
