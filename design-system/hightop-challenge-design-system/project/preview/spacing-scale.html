<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px 28px;display:flex;flex-direction:column;gap:10px}
  .row{display:grid;grid-template-columns:60px 80px 1fr;gap:14px;align-items:center}
  .tag{font-weight:900;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ht-cyan-300)}
  .val{font-family:var(--ht-font-mono);font-size:12px;color:var(--ht-fg-muted);font-variant-numeric:tabular-nums;font-weight:700}
  .bar{height:18px;border-radius:6px;background:linear-gradient(to right,var(--ht-cyan-400),var(--ht-violet-500));box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
</style></head><body><div class="card">
  <div class="row"><span class="tag">space-1</span><span class="val">4px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="tag">space-2</span><span class="val">8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="tag">space-3</span><span class="val">12px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="tag">space-4</span><span class="val">16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="tag">space-5</span><span class="val">20px</span><span class="bar" style="width:20px"></span></div>
  <div class="row"><span class="tag">space-6</span><span class="val">24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="tag">space-8</span><span class="val">32px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="tag">space-10</span><span class="val">40px</span><span class="bar" style="width:40px"></span></div>
  <div class="row"><span class="tag">space-12</span><span class="val">48px</span><span class="bar" style="width:48px"></span></div>
</div></body></html>
