<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:24px 28px}
  .title{
    font-family:var(--ht-font-display);font-weight:400;
    font-size:48px;line-height:1.02;letter-spacing:0.045em;
    text-transform:uppercase;color:#ffffff;
    text-shadow:
      0 1px 0 rgba(12,18,28,.85),
      0 3px 0 rgba(12,18,28,.65),
      0 6px 14px rgba(12,18,28,.55),
      0 0 18px rgba(255,255,255,.45);
  }
  .meta{display:flex;gap:16px;margin-top:14px;font-size:12px;color:var(--ht-fg-muted);
        font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .meta b{display:block;color:var(--ht-fg-secondary);letter-spacing:0;text-transform:none;font-weight:800;font-size:13px;margin-top:2px}
</style></head><body><div class="card">
  <div class="title">Hightop Speed Trivia</div>
  <div class="meta">
    <div>Family<b>Bree Serif</b></div>
    <div>Weight<b>400 (only)</b></div>
    <div>Tracking<b>0.045em</b></div>
    <div>Transform<b>UPPERCASE</b></div>
    <div>Shadow<b>scoreboard emboss</b></div>
  </div>
</div></body></html>
