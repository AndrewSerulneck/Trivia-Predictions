<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body);min-height:100%}
  .card{box-sizing:border-box;width:700px;padding:34px;display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
  .s{height:120px;background:var(--ht-surface);border-radius:16px;border:1px solid rgba(255,255,255,.08);padding:14px;display:flex;flex-direction:column;justify-content:space-between}
  .s b{font-size:11px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--ht-cyan-300)}
  .s code{font-family:var(--ht-font-mono);font-size:10.5px;color:var(--ht-fg-muted);font-weight:700;line-height:1.35}
  .card-shadow{box-shadow:0 8px 24px rgba(0,0,0,.40)}
  .modal-shadow{box-shadow:0 20px 60px rgba(0,0,0,.55)}
  .glow-shadow{box-shadow:0 0 0 1px rgba(34,211,238,.30),0 8px 28px rgba(34,211,238,.18)}
</style></head><body><div class="card">
  <div class="s card-shadow">
    <b>Card</b>
    <code>0 8 24 rgba(0,0,0,.40)</code>
  </div>
  <div class="s modal-shadow">
    <b>Modal</b>
    <code>0 20 60 rgba(0,0,0,.55)</code>
  </div>
  <div class="s glow-shadow">
    <b>Cyan Glow</b>
    <code>0 0 0 1 cyan/.30, 0 8 28 cyan/.18</code>
  </div>
</div></body></html>
