<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<script src="https://unpkg.com/lucide@0.564.0/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px;display:flex;flex-direction:column;gap:14px}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
  .tile{background:var(--ht-surface);border:1px solid rgba(255,255,255,.08);border-radius:10px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 6px}
  .tile svg{width:24px;height:24px;color:var(--ht-cyan-300)}
  .tile small{font-size:9.5px;font-weight:700;color:var(--ht-fg-muted);letter-spacing:.02em}
  .legend{font-size:11px;color:var(--ht-fg-muted);font-weight:600;line-height:1.5}
  code{font-family:var(--ht-font-mono);color:var(--ht-cyan-300);font-weight:700}
</style></head><body><div class="card">
  <div class="grid">
    <div class="tile"><i data-lucide="home"></i><small>home</small></div>
    <div class="tile"><i data-lucide="trophy"></i><small>trophy</small></div>
    <div class="tile"><i data-lucide="zap"></i><small>zap</small></div>
    <div class="tile"><i data-lucide="users"></i><small>users</small></div>
    <div class="tile"><i data-lucide="bell"></i><small>bell</small></div>
    <div class="tile"><i data-lucide="menu"></i><small>menu</small></div>
    <div class="tile"><i data-lucide="chevron-left"></i><small>chev-left</small></div>
    <div class="tile"><i data-lucide="x"></i><small>x</small></div>

    <div class="tile"><i data-lucide="map-pin"></i><small>map-pin</small></div>
    <div class="tile"><i data-lucide="qr-code"></i><small>qr-code</small></div>
    <div class="tile"><i data-lucide="check"></i><small>check</small></div>
    <div class="tile"><i data-lucide="circle-help"></i><small>help</small></div>
    <div class="tile"><i data-lucide="lock"></i><small>lock</small></div>
    <div class="tile"><i data-lucide="timer"></i><small>timer</small></div>
    <div class="tile"><i data-lucide="medal"></i><small>medal</small></div>
    <div class="tile"><i data-lucide="play"></i><small>play</small></div>
  </div>
  <div class="legend">Library: <code>lucide-react@0.564</code> · stroke 2px · sizes 16/20/24 · color inherits via <code>currentColor</code>. On dark surfaces, icons take the surrounding section accent.</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
