<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{border-radius:14px;height:120px;display:flex;flex-direction:column;justify-content:space-between;padding:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
  .name{font-weight:900;font-size:13px;letter-spacing:.04em}
  .hex{font-weight:700;font-size:11px;color:rgba(255,255,255,.7);font-variant-numeric:tabular-nums}
  .desc{font-size:10px;color:rgba(255,255,255,.55);font-weight:600;line-height:1.3}
</style></head><body><div class="card">
  <div class="sw" style="background:#020617"><div><div class="name">canvas</div><div class="desc">page bg</div></div><div class="hex">#020617</div></div>
  <div class="sw" style="background:#0f172a"><div><div class="name">surface</div><div class="desc">card default</div></div><div class="hex">#0f172a</div></div>
  <div class="sw" style="background:#1e293b"><div><div class="name">elevated</div><div class="desc">nested / input</div></div><div class="hex">#1e293b</div></div>
  <div class="sw" style="background:#334155"><div><div class="name">elevated-2</div><div class="desc">highest nest</div></div><div class="hex">#334155</div></div>
</div></body></html>
