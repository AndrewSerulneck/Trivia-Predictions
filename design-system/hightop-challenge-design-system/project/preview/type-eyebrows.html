<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--ht-canvas);color:var(--ht-fg-primary);font-family:var(--ht-font-body)}
  .card{box-sizing:border-box;width:700px;padding:22px 28px;display:flex;flex-direction:column;gap:12px}
  .eyebrow{font-weight:900;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
  .num{font-variant-numeric:tabular-nums;font-family:var(--ht-font-body);font-weight:900}
  .row{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .pill{padding:8px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:var(--ht-surface);display:inline-flex;align-items:center;gap:10px}
  small{color:var(--ht-fg-muted);font-weight:600;font-size:11px}
</style></head><body><div class="card">
  <div class="row">
    <div class="pill"><span class="eyebrow" style="color:var(--ht-cyan-300)">Live Trivia Rules</span></div>
    <div class="pill"><span class="eyebrow" style="color:var(--ht-emerald-300)">Round 2 · Question 7</span></div>
  </div>
  <div class="row">
    <div class="pill"><span class="eyebrow" style="color:var(--ht-amber-300)">Next Showdown In</span></div>
    <div class="pill"><span class="eyebrow" style="color:var(--ht-fuchsia-300)">Answer Reveal</span></div>
    <div class="pill"><span class="eyebrow" style="color:var(--ht-rose-400)">Forfeited</span></div>
  </div>
  <div style="height:1px;background:rgba(255,255,255,.08);margin:6px 0"></div>
  <div class="row">
    <div class="pill"><span class="num" style="color:var(--ht-amber-200);font-size:32px">00:14:32</span><small>lobby</small></div>
    <div class="pill"><span class="num" style="color:var(--ht-emerald-300);font-size:32px">27<span style="font-size:18px">s</span></span><small>question</small></div>
    <div class="pill"><span class="num" style="color:var(--ht-fg-primary);font-size:32px">+10</span><small>points</small></div>
  </div>
</div></body></html>
